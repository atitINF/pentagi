apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: pentagi
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
      - name: neo4j
        image: neo4j:5-community
        env:
        - name: NEO4J_server_config_strict__validation_enabled
          value: "false"
        - name: NEO4J_AUTH
          valueFrom:
            secretKeyRef:
              name: pentagi-secrets
              key: NEO4J_AUTH
        ports:
        - containerPort: 7687
          name: bolt
        - containerPort: 7474
          name: http
        volumeMounts:
        - name: neo4j-data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: neo4j-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: pentagi
spec:
  ports:
  - port: 7687
    name: bolt
  - port: 7474
    name: http
  selector:
    app: neo4j
