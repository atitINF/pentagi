apiVersion: v1
kind: Secret
metadata:
  name: pentagi-secrets
  namespace: pentagi
type: Opaque
stringData:
  # PentAGI reads OPEN_AI_KEY, not OPENAI_API_KEY
  OPEN_AI_KEY: "sk-replace-with-your-openai-key"
  POSTGRES_PASSWORD: "P@ssw0rd@INF"
  # Full URLs stored in the secret so @ in the password can be %-encoded once, here
  DATABASE_URL: "postgres://postgres:P%40ssw0rd%40INF@postgres.pentagi.svc.cluster.local:5432/pentagidb?sslmode=disable"
  # NEO4J_AUTH format is username/password (used by the neo4j container)
  NEO4J_AUTH: "neo4j/P@ssw0rd@INF"
  # GRAPHITI_URL is the Bolt URI used by PentAGI (@ in password must be %-encoded)
  GRAPHITI_URL: "bolt://neo4j:P%40ssw0rd%40INF@neo4j.pentagi.svc.cluster.local:7687"
