apiVersion: v1
kind: Secret
metadata:
  name: pentagi-secrets
  namespace: pentagi
type: Opaque
stringData:
  # PentAGI reads OPEN_AI_KEY, not OPENAI_API_KEY
  GEMINI_API_KEY: "xxxx"
  POSTGRES_PASSWORD: "xxxx"
  # Full URLs stored in the secret so @ in the password can be %-encoded once, here
  DATABASE_URL: "postgres://postgres:xxxxxx@postgres.pentagi.svc.cluster.local:5432/pentagidb?sslmode=disable"
  # NEO4J_AUTH format is username/password (used by the neo4j container)
  NEO4J_AUTH: "neo4j/xxxxxxxx"
  # GRAPHITI_URL is the Bolt URI used by PentAGI (@ in password must be %-encoded)
  GRAPHITI_URL: "bolt://neo4j:xxxxxxx@neo4j.pentagi.svc.cluster.local:7687"
  COOKIE_SIGNING_SALT: "xxxxxxxxx7e6f5a4b3c2d1e0a"
