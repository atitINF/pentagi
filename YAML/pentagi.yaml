apiVersion: apps/v1
kind: Deployment
metadata:
  name: pentagi
  namespace: pentagi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pentagi
  template:
    metadata:
      labels:
        app: pentagi
    spec:
      initContainers:
      # Opens the Docker socket so uid 1000 can reach it regardless of the
      # node's docker group GID. Runs once at pod startup then exits.
      - name: fix-docker-perms
        image: busybox
        securityContext:
          runAsUser: 0
        command: ["chmod", "666", "/var/run/docker.sock"]
        volumeMounts:
        - name: host-docker-socket
          mountPath: /var/run/docker.sock

      containers:
      # --- The Main App ---
      - name: pentagi
        image: pentagi:1.0.0
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 8443
        env:
        - name: HOME
          value: "/opt/pentagi"
        - name: OLLAMA_HOME
          value: "/opt/pentagi/.ollama"
        - name: SERVER_USE_SSL
          value: "true"
        - name: SERVER_PORT
          value: "8443"
        - name: GRAPHITI_ENABLED
          value: "true"
        # Use host Docker socket instead of DinD sidecar.
        # Requires the node's docker group GID to be set in supplementalGroups below,
        # and the host socket mounted via host-docker-socket volume.
        - name: DOCKER_HOST
          value: "unix:///var/run/docker.sock"
        envFrom:
        - secretRef:
            name: pentagi-secrets
        volumeMounts:
        - name: shared-data
          mountPath: /opt/pentagi/data
        - name: host-docker-socket
          mountPath: /var/run/docker.sock

      volumes:
      - name: shared-data
        emptyDir: {}
      # Mount the host node's Docker socket. The node must be running Docker
      # (not containerd-only). On containerd-only nodes use the DinD approach instead.
      - name: host-docker-socket
        hostPath:
          path: /var/run/docker.sock
          type: Socket

---
apiVersion: v1
kind: Service
metadata:
  name: pentagi-svc
  namespace: pentagi
spec:
  type: LoadBalancer
  ports:
  - port: 8443
    targetPort: 8443
  selector:
    app: pentagi
